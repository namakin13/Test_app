<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ctrl1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>

  <!-- Sound waves (left & right) -->
  <g stroke="#fbbf24" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M 70 256 Q 50 220 70 184"/>
    <path d="M 40 256 Q 10 200 40 144"/>
    <path d="M 442 256 Q 462 220 442 184"/>
    <path d="M 472 256 Q 502 200 472 144"/>
  </g>

  <!-- Controller body -->
  <g transform="translate(256 280)">
    <!-- Main body: gamepad shape with two grips -->
    <path d="M -160 -30
             Q -160 -80 -110 -80
             L 110 -80
             Q 160 -80 160 -30
             L 160 40
             Q 160 90 110 90
             Q 80 90 65 65
             L -65 65
             Q -80 90 -110 90
             Q -160 90 -160 40 Z"
          fill="url(#ctrl1)" stroke="#1e293b" stroke-width="6"/>

    <!-- D-pad (left) -->
    <g transform="translate(-90 -10)" fill="#1e293b">
      <rect x="-28" y="-10" width="56" height="20" rx="3"/>
      <rect x="-10" y="-28" width="20" height="56" rx="3"/>
    </g>

    <!-- 4 buttons (right) -->
    <g transform="translate(90 -10)">
      <circle cx="0" cy="-22" r="10" fill="#fbbf24"/>
      <circle cx="-22" cy="0" r="10" fill="#3b82f6"/>
      <circle cx="22" cy="0" r="10" fill="#ef4444"/>
      <circle cx="0" cy="22" r="10" fill="#10b981"/>
    </g>

    <!-- Center speaker icon -->
    <g transform="translate(0 5)">
      <path d="M -18 -12 L -6 -12 L 8 -24 L 8 24 L -6 12 L -18 12 Z"
            fill="#1e293b"/>
      <path d="M 14 -10 Q 22 0 14 10" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 20 -16 Q 32 0 20 16" stroke="#1e293b" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
