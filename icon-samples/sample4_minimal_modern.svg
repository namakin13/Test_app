<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg4)"/>

  <!-- Large controller silhouette (centered) -->
  <g transform="translate(256 256)">
    <!-- Controller body -->
    <path d="M -180 -40
             Q -180 -110 -110 -110
             L 110 -110
             Q 180 -110 180 -40
             L 180 50
             Q 180 120 110 120
             Q 75 120 55 90
             L -55 90
             Q -75 120 -110 120
             Q -180 120 -180 50 Z"
          fill="#f8fafc" stroke="#064e3b" stroke-width="8" stroke-linejoin="round"/>

    <!-- Left grip detail -->
    <circle cx="-130" cy="40" r="35" fill="none" stroke="#064e3b" stroke-width="6" opacity="0.3"/>
    <!-- Right grip detail -->
    <circle cx="130" cy="40" r="35" fill="none" stroke="#064e3b" stroke-width="6" opacity="0.3"/>

    <!-- D-pad (left) -->
    <g transform="translate(-110 -20)" fill="#064e3b">
      <rect x="-25" y="-9" width="50" height="18" rx="3"/>
      <rect x="-9" y="-25" width="18" height="50" rx="3"/>
    </g>

    <!-- 4 face buttons (right) -->
    <g transform="translate(110 -20)">
      <circle cx="0" cy="-26" r="11" fill="#fbbf24"/>
      <circle cx="-26" cy="0" r="11" fill="#3b82f6"/>
      <circle cx="26" cy="0" r="11" fill="#ef4444"/>
      <circle cx="0" cy="26" r="11" fill="#10b981"/>
    </g>

    <!-- Center: Speaker icon (large, the focal point) -->
    <g transform="translate(0 -20)">
      <!-- Speaker body -->
      <path d="M -22 -14 L -8 -14 L 10 -30 L 10 30 L -8 14 L -22 14 Z"
            fill="#064e3b"/>
      <!-- Sound waves -->
      <path d="M 18 -12 Q 28 0 18 12" stroke="#064e3b" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 26 -20 Q 42 0 26 20" stroke="#064e3b" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Subtle sound wave arcs around the icon -->
  <g stroke="#fbbf24" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 60 130 Q 80 100 110 90"/>
    <path d="M 452 130 Q 432 100 402 90"/>
  </g>
</svg>
