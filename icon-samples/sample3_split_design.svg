<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="leftHalf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="rightHalf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>

  <!-- Diagonal split decoration -->
  <path d="M 0 512 L 512 0 L 512 512 Z" fill="#1e1b4b" opacity="0.4"/>

  <!-- Left side: Speaker (large) -->
  <g transform="translate(160 256)">
    <!-- Speaker body -->
    <path d="M -50 -40 L -10 -40 L 40 -90 L 40 90 L -10 40 L -50 40 Z"
          fill="url(#leftHalf)" stroke="#f8fafc" stroke-width="6" stroke-linejoin="round"/>
    <!-- Sound waves -->
    <path d="M 60 -40 Q 90 0 60 40" stroke="#06b6d4" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 85 -65 Q 125 0 85 65" stroke="#06b6d4" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 110 -90 Q 160 0 110 90" stroke="#06b6d4" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Right side: Controller -->
  <g transform="translate(340 256)">
    <!-- Controller body (compact) -->
    <path d="M -80 -20
             Q -80 -60 -45 -60
             L 45 -60
             Q 80 -60 80 -20
             L 80 30
             Q 80 70 45 70
             Q 25 70 15 50
             L -15 50
             Q -25 70 -45 70
             Q -80 70 -80 30 Z"
          fill="url(#rightHalf)" stroke="#f8fafc" stroke-width="6" stroke-linejoin="round"/>

    <!-- D-pad -->
    <g transform="translate(-45 -5)" fill="#0f172a">
      <rect x="-18" y="-6" width="36" height="12" rx="2"/>
      <rect x="-6" y="-18" width="12" height="36" rx="2"/>
    </g>

    <!-- Buttons -->
    <g transform="translate(45 -5)">
      <circle cx="0" cy="-14" r="7" fill="#fbbf24"/>
      <circle cx="-14" cy="0" r="7" fill="#3b82f6"/>
      <circle cx="14" cy="0" r="7" fill="#0f172a"/>
      <circle cx="0" cy="14" r="7" fill="#10b981"/>
    </g>
  </g>

  <!-- Center connecting element: lightning/swap -->
  <g transform="translate(256 380)">
    <circle r="40" fill="#fbbf24" stroke="#f8fafc" stroke-width="5"/>
    <path d="M -8 -18 L 6 -4 L -2 -2 L 8 18 L -6 4 L 2 2 Z" fill="#0f172a"/>
  </g>
</svg>
